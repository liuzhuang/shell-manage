name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    if: github.repository == 'liuzhuang/shell-manage'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      commit: ${{ steps.prepare.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
      - id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          test "$TAG" = "v$(node -p "require('./package.json').version")" || { echo "$TAG does not match package.json"; exit 1; }
          test "$(gh api "repos/$GH_REPO" --jq '.private')" = 'false' || { echo "Release repository must be public"; exit 1; }
          DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || true)
          test "$DRAFT" != 'false' || { echo "$TAG is already published"; exit 1; }
          test "$DRAFT" = 'true' || gh release create "$TAG" --draft --target "$GITHUB_SHA" --generate-notes --title "ShellManage $TAG"
          {
            echo "version=$VERSION"
            echo "commit=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: --win nsis --x64
          - name: macOS Intel and Apple Silicon
            runner: macos-15-intel
            target: --mac dmg zip --x64 --arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check Sparkle signing key
        if: runner.os == 'macOS'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: test -n "$SPARKLE_PRIVATE_KEY" || { echo "Missing SPARKLE_PRIVATE_KEY"; exit 1; }
      - name: Prepare Sparkle updater
        if: runner.os == 'macOS'
        run: bash scripts/prepare-sparkle.sh client
      - name: Build installers and update metadata
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.target }} --publish always
      - name: Generate and upload signed Sparkle appcasts
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          bash scripts/prepare-sparkle.sh tools
          APPCAST_ROOT="$RUNNER_TEMP/shell-manage-appcast"
          mkdir -p "$APPCAST_ROOT/x64" "$APPCAST_ROOT/arm64"
          cp "release/ShellManage-${VERSION}-macos-x64.zip" "$APPCAST_ROOT/x64/"
          cp "release/ShellManage-${VERSION}-macos-arm64.zip" "$APPCAST_ROOT/arm64/"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | build/sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/liuzhuang/shell-manage/releases/download/${TAG}/" \
            --maximum-deltas 0 \
            -o release/appcast-mac-x64.xml \
            "$APPCAST_ROOT/x64"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | build/sparkle-tools/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/liuzhuang/shell-manage/releases/download/${TAG}/" \
            --maximum-deltas 0 \
            -o release/appcast-mac-arm64.xml \
            "$APPCAST_ROOT/arm64"
          grep -q 'sparkle:edSignature' release/appcast-mac-x64.xml
          grep -q 'sparkle:edSignature' release/appcast-mac-arm64.xml
          grep -q 'sparkle-signatures:' release/appcast-mac-x64.xml
          grep -q 'sparkle-signatures:' release/appcast-mac-arm64.xml
          gh release upload "$TAG" \
            release/appcast-mac-x64.xml \
            release/appcast-mac-arm64.xml \
            --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
            release/appcast-mac-*.xml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          for REQUIRED in \
            "ShellManage-${VERSION}-windows-x64-setup.exe" \
            "ShellManage-${VERSION}-macos-x64.dmg" \
            "ShellManage-${VERSION}-macos-arm64.dmg" \
            "ShellManage-${VERSION}-macos-x64.zip" \
            "ShellManage-${VERSION}-macos-arm64.zip" \
            latest.yml \
            latest-mac.yml \
            appcast-mac-x64.xml \
            appcast-mac-arm64.xml
          do
            printf '%s\n' "$ASSETS" | grep -Fxq "$REQUIRED" || { echo "Missing release asset: $REQUIRED"; exit 1; }
          done
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest --title "ShellManage $TAG"

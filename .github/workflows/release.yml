name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      commit: ${{ steps.prepare.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
      - id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          test "$TAG" = "v$(node -p "require('./package.json').version")" || { echo "$TAG does not match package.json"; exit 1; }
          test "$(gh api "repos/$GH_REPO" --jq '.private')" = 'false' || { echo "Release repository must be public"; exit 1; }
          DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || true)
          test "$DRAFT" != 'false' || { echo "$TAG is already published"; exit 1; }
          test "$DRAFT" = 'true' || gh release create "$TAG" --draft --target "$GITHUB_SHA" --generate-notes --title "ShellManage $TAG"
          {
            echo "version=$VERSION"
            echo "commit=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: --win nsis --x64
          - name: macOS Intel and Apple Silicon
            runner: macos-15-intel
            target: --mac dmg zip --x64 --arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build unsigned installers and update metadata
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.target }} --publish always
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest --title "ShellManage $TAG"
